<!DOCTYPE html>
<html>
<head>
<title>Magazzino</title>

<style>
body{font-family:Arial;padding:30px;background:#f4f6f8}
.box{background:white;padding:20px;border-radius:10px;margin-bottom:20px}
h3{margin-top:25px;color:#1d4ed8}
.row{padding:6px 0;border-bottom:1px solid #eee}
</style>

</head>
<body>

<a href="/">← Home</a>

<div class="box">

<h2>Magazzino</h2>

{% for cliente, prodotti in grouped.items() %}

<h3>{{cliente}}</h3>

{% for p in prodotti %}

<div class="row">
{{p.prodotto}} : <b>{{p.qty}}</b>
</div>

{% endfor %}

{% endfor %}

</div>

</body>
</html>
