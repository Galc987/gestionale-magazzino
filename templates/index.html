<!DOCTYPE html>
<html>
<head>
    <title>Gestionale Magazzino</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #111827;
            color: white;
            padding: 15px;
            font-size: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        input, select, button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        ul {
            padding-left: 20px;
        }

        .order {
            background: #f3f4f6;
            padding: 5px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<header>
    📦 Gestionale Aziendale
</header>

<div class="container">

    <!-- CLIENTI / ORDINI -->
    <div class="card">
        <h2>Nuovo Ordine</h2>

        <form method="POST" action="/add_order">

            <label>Cliente</label>
            <select name="client" id="client" onchange="updateProducts()">
                {% for c in clients %}
                    <option value="{{c}}">{{c}}</option>
                {% endfor %}
            </select>

            <label>Prodotto</label>
            <select name="product" id="product"></select>

            <label>Quantità</label>
            <input name="qty" type="number">

            <button type="submit">Crea Ordine</button>
        </form>
    </div>

    <!-- MAGAZZINO SIMULATO -->
    <div class="card">
        <h2>Ordini Inseriti</h2>

        {% for o in orders %}
            <div class="order">
                {{o.client}} - {{o.product}} - {{o.qty}}
            </div>
        {% endfor %}
    </div>

</div>

<script>
    const data = {{ clients | tojson }};

    function updateProducts() {
        let client = document.getElementById("client").value;
        let productSelect = document.getElementById("product");

        productSelect.innerHTML = "";

        data[client].forEach(p => {
            let opt = document.createElement("option");
            opt.value = p;
            opt.text = p;
            productSelect.appendChild(opt);
        });
    }

    updateProducts();
</script>

</body>
</html>
