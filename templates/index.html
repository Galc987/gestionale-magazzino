<!DOCTYPE html>
<html>
<head>
    <title>Gestionale</title>

    <style>
        body { font-family: Arial; background:#f4f6f8; margin:0; }
        header { background:#111827; color:white; padding:15px; }
        .container { display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:15px; }

        .card { background:white; padding:15px; border-radius:10px; }

        input, select, button {
            width:100%; padding:8px; margin-top:5px;
        }

        button { background:#2563eb; color:white; border:none; cursor:pointer; }

        .done { text-decoration: line-through; opacity:0.5; }

        .order { background:#f3f4f6; padding:5px; margin-top:5px; }
    </style>
</head>

<body>

<header>📦 Gestionale Magazzino</header>

<div class="container">

    <!-- MAGAZZINO -->
    <div class="card">
        <h2>Magazzino</h2>

        {% for p, q in stock.items() %}
            <div>{{p}} — Stock: {{q}}</div>
        {% endfor %}
    </div>

    <!-- ORDINI -->
    <div class="card">
        <h2>Nuovo Ordine</h2>

        <form method="POST" action="/add_order">

            <label>Cliente</label>
            <select name="client" id="client" onchange="updateProducts()">
                {% for c in clients %}
                    <option value="{{c}}">{{c}}</option>
                {% endfor %}
            </select>

            <div id="products"></div>

            <button type="submit">Crea Ordine</button>
        </form>
    </div>

    <!-- ORDINI INSERITI -->
    <div class="card">
        <h2>Ordini Inseriti</h2>

        {% for o in orders %}
            <div class="order {% if o.done %}done{% endif %}">
                <a href="/toggle_order/{{loop.index0}}">
                    ☑
                </a>

                <b>{{o.client}}</b>

                {% for i in o.items %}
                    <div>{{i.product}} - {{i.qty}}</div>
                {% endfor %}
            </div>
        {% endfor %}
    </div>

</div>

<script>
    const data = {{ clients | tojson }};

    function updateProducts() {
        let client = document.getElementById("client").value;
        let container = document.getElementById("products");

        container.innerHTML = "";

        data[client].forEach(p => {

            container.innerHTML += `
                <div>
                    <input type="checkbox" name="product" value="${p}">
                    ${p}
                    <input type="number" name="qty" placeholder="Qtà">
                </div>
            `;
        });
    }

    updateProducts();
</script>

</body>
</html>
