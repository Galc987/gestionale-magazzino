<!DOCTYPE html>
<html>
<head>
<title>Gestionale</title>

<style>
body{font-family:Arial;background:#f4f6f8;margin:0;}
header{background:#111827;color:white;padding:15px;font-size:22px;}
.container{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:10px;}
.card{background:white;padding:12px;border-radius:10px;}
input,select,button{width:100%;padding:7px;margin-top:5px;}
button{background:#2563eb;color:white;border:none;}
.order{background:#f3f4f6;padding:7px;margin-top:7px;}
.done{background:#d1fae5;}
</style>
</head>

<body>

<header>📦 Gestionale Aziendale</header>

<div class="container">

<div class="card">
<h3>Nuova Produzione</h3>

<form method="POST" action="/add_order">

<select name="client" id="client" onchange="updateProducts()">
{% for c in clients %}
<option value="{{c}}">{{c}}</option>
{% endfor %}
</select>

<div id="products"></div>

<button type="submit">Inserisci Produzione</button>

</form>
</div>

<div class="card">
<h3>Produzione</h3>

{% for o in orders %}
<div class="order">

<b>{{o.client}}</b> - {{o.status}}

{% for item in o.items %}
<div class="{% if item.done %}done{% endif %}">
<a href="/toggle/{{loop.parent.index0}}/{{loop.index0}}">☑</a>
{{item.product}} - {{item.qty}}
</div>
{% endfor %}

<a href="/complete/{{loop.index0}}">✔ Finita</a>

</div>
{% endfor %}

</div>

<div class="card">
<h3>Magazzino</h3>

{% for p,q in stock.items() %}
<div>{{p}} : {{q}}</div>
{% endfor %}

</div>

</div>

<script>
const data = {{ clients | tojson }};

function updateProducts(){
let client = document.getElementById("client").value;
let box = document.getElementById("products");

box.innerHTML = "";

data[client].forEach((p,index) => {
box.innerHTML += `
<label>${p}</label>
<input type="number" name="qty_${index}" placeholder="Quantità">
`;
});
}

updateProducts();
</script>

</body>
</html>
