<!DOCTYPE html>
<html>
<head>
<title>Gestionale Aziendale</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f4f6f8; padding: 40px 20px; }
h1 { margin-bottom: 30px; color: #2c3e50; }
.menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    max-width: 700px;
}
a.card {
    display: block;
    padding: 30px 20px;
    background: white;
    text-decoration: none;
    color: #2c3e50;
    border-radius: 12px;
    font-size: 22px;
    text-align: center;
    box-shadow: 0 2px 10px rgba(0,0,0,.08);
    transition: box-shadow .2s;
}
a.card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.15); }
.icon { font-size: 36px; display: block; margin-bottom: 10px; }
</style>
</head>
<body>
<h1>Gestionale Aziendale</h1>
<div class="menu">
    <a class="card" href="/produzione">
        <span class="icon">🏭</span>
        Produzione
    </a>
    <a class="card" href="/magazzino">
        <span class="icon">📦</span>
        Magazzino
    </a>
    <a class="card" href="/storico">
        <span class="icon">📋</span>
        Storico
    </a>
</div>
</body>
</html>
