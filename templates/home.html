<!DOCTYPE html>
<html>
<head>
<title>Gestionale Aziendale</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f4f6f8; padding: 40px 20px; }
h1 { margin-bottom: 30px; color: #2c3e50; }
.menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    max-width: 900px;
}
a.card {
    display: block; padding: 28px 20px; background: white;
    text-decoration: none; color: #2c3e50; border-radius: 12px;
    font-size: 20px; text-align: center;
    box-shadow: 0 2px 10px rgba(0,0,0,.08); transition: box-shadow .2s;
    position: relative;
}
a.card:hover { box-shadow: 0 4px 18px rgba(0,0,0,.15); }
.icon { font-size: 34px; display: block; margin-bottom: 10px; }
.badge {
    position: absolute; top: 12px; right: 12px;
    background: #e74c3c; color: white; border-radius: 50%;
    width: 24px; height: 24px; font-size: 13px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
}
</style>
</head>
<body>
<h1>Gestionale Aziendale</h1>
<div class="menu">
    <a class="card" href="/produzione">
        <span class="icon">🏭</span>Produzione
    </a>
    <a class="card" href="/magazzino">
        <span class="icon">📦</span>Magazzino
        {% if alert_mp > 0 %}
        <span class="badge">{{ alert_mp }}</span>
        {% endif %}
    </a>
    <a class="card" href="/consegne">
        <span class="icon">🚚</span>Consegne
    </a>
    <a class="card" href="/storico">
        <span class="icon">📋</span>Storico
    </a>
</div>
</body>
</html>
