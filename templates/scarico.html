<!DOCTYPE html>
<html>
<head>
<title>Scarico Magazzino</title>
<style>
body{font-family:Arial;padding:30px;background:#f4f6f8}
.box{background:white;padding:20px;border-radius:10px;margin-bottom:20px}
input,select,button{padding:10px;width:100%;margin:8px 0}
</style>
</head>
<body>

<a href="/">← Home</a>

<div class="box">

<h2>Scarico Magazzino</h2>

<form method="GET" action="/scarico">

<select name="cliente">
<option value="">Seleziona Cliente</option>

{% for c in clients %}
<option value="{{c}}" {% if request.args.get('cliente') == c %}selected{% endif %}>
{{c}}
</option>
{% endfor %}

</select>

<button type="submit">Continua</button>

</form>

{% if request.args.get('cliente') %}

<hr>

<form method="POST" action="/esegui_scarico">

<input type="hidden" name="client" value="{{request.args.get('cliente')}}">

<h3>{{request.args.get('cliente')}}</h3>

{% for p in clients[request.args.get('cliente')] %}

<div>
{{p}}
<input type="number" name="qty_{{loop.index0}}" min="0">
</div>

{% endfor %}

<button type="submit">Scarica Magazzino</button>

</form>

{% endif %}

</div>

</body>
</html>
